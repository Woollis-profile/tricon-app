<!-- v2 build -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TRICON Training</title>
<meta name="description" content="Training method for the older and wiser athlete." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #e3b23f;
    --gold-deep: #cf9a2b;
    --dim: 0.28;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0b;
    font-family: 'Oswald', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Screen ─────────────────────────────────────────── */
  .screen {
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .bg-wrap {
    position: absolute;
    inset: 0;
    filter: grayscale(1) contrast(1.05);
  }
  .bg-wrap img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .scrim-dim {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: var(--dim);
  }
  .scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.55) 0%,
      rgba(0,0,0,0.10) 22%,
      rgba(0,0,0,0.00) 42%,
      rgba(0,0,0,0.45) 70%,
      rgba(0,0,0,0.92) 100%);
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
  }

  /* ── Top wordmark ───────────────────────────────────── */
  .topmark {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 60px 30px 0;
  }
  .topglyph { width: 26px; height: 26px; display: block; }
  .topglyph svg { width: 100%; height: 100%; display: block; }
  .tt {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.42em;
    line-height: 1;
    color: var(--gold);
    text-indent: 0.42em;
  }

  /* ── Hero ───────────────────────────────────────────── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 0 24px;
  }
  .logo {
    --mark: #1b1a18;
    position: relative;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    box-sizing: border-box;
    border: 4px solid var(--gold);
    background: radial-gradient(circle at 38% 30%, #fcfbf7 0%, #f2eee3 64%, #e7e1d2 100%);
    box-shadow:
      0 22px 60px rgba(0,0,0,0.55),
      0 0 0 1px rgba(0,0,0,0.25),
      0 0 38px rgba(227,178,63,0.28),
      inset 0 0 0 1px rgba(255,255,255,0.7);
    transform: translateY(-38px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo svg.mark {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .wordlock {
    position: relative;
    text-align: center;
    line-height: 0.88;
    transform: translateY(-19px);
  }
  .logo .cut {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 30%, #fcfbf7 0%, #f2eee3 64%, #e7e1d2 100%);
    clip-path: inset(31% 5% 49% 5%);
  }
  .wordlock .tricon {
    font-size: 66px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--gold);
    display: block;
  }
  .wordlock .workout {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.46em;
    text-indent: 0.46em;
    margin-top: 3px;
    color: #1b1a18;
    display: block;
  }
  .tagline {
    max-width: 320px;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.16em;
    line-height: 1.55;
    text-transform: uppercase;
    color: rgba(255,255,255,0.72);
    text-indent: 0.16em;
    text-align: center;
    text-wrap: balance;
  }

  /* ── Actions ────────────────────────────────────────── */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 0 22px 30px;
  }
  .btn {
    height: 58px;
    border: none;
    border-radius: 16px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    width: 340px;
    max-width: 90%;
    margin: 0 auto;
    display: block;
  }
  .btn-light {
    background: #f3f1ea;
    color: #1a1916;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  }
  .btn-gold {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    color: #2e2206;
    box-shadow:
      0 8px 26px rgba(227,178,63,0.45),
      0 2px 6px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .btn:active { opacity: 0.82; transform: scale(0.98); }
  .signin {
    text-align: center;
    margin-top: 6px;
    font-size: 12.5px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .signin b { color: var(--gold); font-weight: 600; }

  /* ── Responsive ─────────────────────────────────────── */
  @media (max-width: 400px) {
    .logo { width: 290px; height: 290px; }
    .wordlock .tricon { font-size: 54px; }
    .wordlock .workout { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="screen">

  <!-- Background photo -->
  <div class="bg-wrap">
    <img src="assets/gym-bg.png" alt="" role="presentation" />
  </div>
  <div class="scrim-dim"></div>
  <div class="scrim"></div>

  <div class="content">

    <!-- Top wordmark -->
    <div class="topmark">
      <div class="topglyph" aria-hidden="true">
        <svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="150,52 248,222 52,222"
            stroke="#ffffff" stroke-width="22"
            stroke-linejoin="round" stroke-linecap="round" />
        </svg>
      </div>
      <span class="tt">TRICON</span>
    </div>

    <!-- Hero badge + tagline -->
    <div class="hero">
      <div class="logo" aria-label="TRICON TRAINING">

        <!-- Barbell triangle mark -->
        <svg class="mark" viewBox="0 0 440 440" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(220 220) scale(1.2) translate(-220 -220)">
            <g transform="translate(220 305) rotate(0)" fill="#1b1a18">
              <rect x="-147.224" y="-3.5" width="294.448" height="7" rx="3.5"/>
              <rect x="77" y="-9" width="5" height="18" rx="2"/>
              <rect x="88" y="-27" width="9.5" height="54" rx="3"/>
              <rect x="101" y="-22" width="9" height="44" rx="3"/>
              <rect x="114" y="-17" width="8.5" height="34" rx="2.5"/>
              <rect x="-82" y="-9" width="5" height="18" rx="2"/>
              <rect x="-97.5" y="-27" width="9.5" height="54" rx="3"/>
              <rect x="-110" y="-22" width="9" height="44" rx="3"/>
              <rect x="-122.5" y="-17" width="8.5" height="34" rx="2.5"/>
            </g>
            <g transform="translate(146.388 177.5) rotate(-60)" fill="#1b1a18">
              <rect x="-147.224" y="-3.5" width="294.448" height="7" rx="3.5"/>
              <rect x="77" y="-9" width="5" height="18" rx="2"/>
              <rect x="88" y="-27" width="9.5" height="54" rx="3"/>
              <rect x="101" y="-22" width="9" height="44" rx="3"/>
              <rect x="114" y="-17" width="8.5" height="34" rx="2.5"/>
              <rect x="-82" y="-9" width="5" height="18" rx="2"/>
              <rect x="-97.5" y="-27" width="9.5" height="54" rx="3"/>
              <rect x="-110" y="-22" width="9" height="44" rx="3"/>
              <rect x="-122.5" y="-17" width="8.5" height="34" rx="2.5"/>
            </g>
            <g transform="translate(293.612 177.5) rotate(60)" fill="#1b1a18">
              <rect x="-147.224" y="-3.5" width="294.448" height="7" rx="3.5"/>
              <rect x="77" y="-9" width="5" height="18" rx="2"/>
              <rect x="88" y="-27" width="9.5" height="54" rx="3"/>
              <rect x="101" y="-22" width="9" height="44" rx="3"/>
              <rect x="114" y="-17" width="8.5" height="34" rx="2.5"/>
              <rect x="-82" y="-9" width="5" height="18" rx="2"/>
              <rect x="-97.5" y="-27" width="9.5" height="54" rx="3"/>
              <rect x="-110" y="-22" width="9" height="44" rx="3"/>
              <rect x="-122.5" y="-17" width="8.5" height="34" rx="2.5"/>
            </g>
          </g>
        </svg>

        <!-- Cream cut — hides barbell bars behind TRICON wordmark -->
        <div class="cut" aria-hidden="true"></div>

        <!-- Wordlock -->
        <div class="wordlock">
          <span class="tricon">TRICON</span>
          <span class="workout">TRAINING</span>
        </div>

      </div><!-- /.logo -->

      <p class="tagline">Training method for the older and wiser athlete</p>
    </div><!-- /.hero -->

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-light">Create Account</button>
      <button class="btn btn-gold">Log In</button>
      <p class="signin">Member already? <b>Restore purchase</b></p>
    </div>

  </div><!-- /.content -->
</div><!-- /.screen -->
</body>
</html>
