<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TRICON — Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #e3b23f;
    --gold-deep: #cf9a2b;
    --dim: 0.28;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0b;
    font-family: 'Oswald', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  /* ── Screen ─────────────────────────────────────────── */
  .screen {
    position: absolute;
    inset: 0;
    background: #000;
    color: #fff;
    overflow: hidden;
  }
  .bg-wrap {
    position: absolute;
    inset: 0;
    filter: grayscale(1) contrast(1.05);
  }
  .bg-wrap image-slot { display: block; width: 100%; height: 100%; }
  .scrim-dim {
    position: absolute;
    inset: 0;
    background: #000;
    opacity: var(--dim);
  }
  .scrim {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.10) 22%,
        rgba(0,0,0,0.00) 42%,
        rgba(0,0,0,0.45) 70%,
        rgba(0,0,0,0.92) 100%);
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
  }

  /* ── Top wordmark ───────────────────────────────────── */
  .topmark {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 60px 30px 0;           /* below the status-bar time */
  }
  .topglyph { width: 26px; height: 26px; display: block; }
  .topglyph svg { width: 100%; height: 100%; display: block; }
  .tt {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.42em;
    line-height: 1;
    color: var(--gold);             /* gold wordmark */
    text-indent: 0.42em;
  }

  /* ── Hero ───────────────────────────────────────────── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 0 24px;
  }
  .logo {
    --mark: #1b1a18;
    position: relative;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    box-sizing: border-box;
    border: 4px solid var(--gold);          /* gold rim */
    background:
      radial-gradient(circle at 38% 30%, #fcfbf7 0%, #f2eee3 64%, #e7e1d2 100%);
    box-shadow:
      0 22px 60px rgba(0,0,0,0.55),
      0 0 0 1px rgba(0,0,0,0.25),
      0 0 38px rgba(227,178,63,0.28),
      inset 0 0 0 1px rgba(255,255,255,0.7);
    transform: translateY(-38px);           /* lifted ~1cm */
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .wordlock {
    position: relative;
    text-align: center;
    line-height: 0.88;
    transform: translateY(-19px);   /* TRICON lockup raised ~0.5cm */
  }
  .logo .cut {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    /* identical gradient to the circle, clipped to the TRICON band — seamless */
    background: radial-gradient(circle at 38% 30%, #fcfbf7 0%, #f2eee3 64%, #e7e1d2 100%);
    clip-path: inset(31% 5% 49% 5%);
  }
  .wordlock .tricon {
    font-size: 66px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--gold);                     /* only TRICON is gold */
  }
  .wordlock .workout {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.46em;
    text-indent: 0.46em;
    margin-top: 3px;
    color: #1b1a18;                          /* WORKOUT black */
  }
  .tagline {
    max-width: 320px;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.16em;
    line-height: 1.55;
    text-transform: uppercase;
    color: rgba(255,255,255,0.72);
    text-indent: 0.16em;
    text-align: center;
    text-wrap: balance;
  }

  /* ── Actions ────────────────────────────────────────── */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 0 22px 30px;
  }
  .btn {
    height: 58px;
    border: none;
    border-radius: 16px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-light {
    background: #f3f1ea;
    color: #1a1916;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  }
  .btn-gold {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    color: #2e2206;
    box-shadow:
      0 8px 26px rgba(227,178,63,0.45),
      0 2px 6px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .signin {
    text-align: center;
    margin-top: 6px;
    font-size: 12.5px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .signin b { color: var(--gold); font-weight: 600; }
</style>
</head>
<body>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>

</body>
</html>
